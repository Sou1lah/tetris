<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Tetris</title>
    <link rel="icon" type="image/png" href="tetris.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tetris</h1>
    <div class="game-container">
        <canvas id="gameCanvas" width="240" height="400"></canvas>
        <div class="sidebar">
            <div class="preview-container">
                <p>Next</p>
                <canvas id="nextCanvas" width="100" height="300"></canvas>
            </div>
            <div class="game-info">
                <p>Score: <span id="score">0</span></p>
                <button id="startButton">Start Game</button>
                <div id="controls" class="hidden">
                    <button id="restartButton">Restart</button>
                    <button id="quitButton">Quit</button>
                </div>
            </div>
        </div>
    </div>
    <div class="instructions">
        <p>← → : Move | ↑ : Rotate | ↓ : Soft Drop</p>
        <p>Clear lines to score points!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
